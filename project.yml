name: yap
options:
  bundleIdPrefix: com.donadelicc
  transitivelyLinkDependencies: true
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_ENABLE_EXPLICIT_MODULES: NO

packages:
  Core:
    path: Packages/Core
  Settings:
    path: Packages/Settings
  Permissions:
    path: Packages/Permissions
  ModelStore:
    path: Packages/ModelStore
  Hotkey:
    path: Packages/Hotkey
  AudioRecorder:
    path: Packages/AudioRecorder
  TextInjector:
    path: Packages/TextInjector
  MenuBarUI:
    path: Packages/MenuBarUI
  SettingsUI:
    path: Packages/SettingsUI
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    exactVersion: 0.14.0
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    exactVersion: 2.25.7
  swift-numerics:
    url: https://github.com/apple/swift-numerics
    from: 1.0.0

targets:
  Transcription:
    type: library.static
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Packages/Transcription/Sources/Transcription
    dependencies:
      - package: Core
      - package: ModelStore
      - package: WhisperKit

  LLMCleanup:
    type: library.static
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Packages/LLMCleanup/Sources/LLMCleanup
    dependencies:
      - package: Core
      - package: ModelStore
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXLMCommon
      - package: swift-numerics
        product: Numerics
      - package: swift-numerics
        product: RealModule
      - package: swift-numerics
        product: ComplexModule
    settings:
      base:
        OTHER_SWIFT_FLAGS: "$(inherited) -Xcc -fmodule-map-file=$(BUILD_DIR)/../../SourcePackages/checkouts/swift-numerics/Sources/_NumericsShims/include/module.modulemap -Xcc -I$(BUILD_DIR)/../../SourcePackages/checkouts/swift-numerics/Sources/_NumericsShims/include -Xcc -fmodule-map-file=$(BUILD_DIR)/../../SourcePackages/checkouts/mlx-swift/Source/Cmlx/include/module.modulemap -Xcc -I$(BUILD_DIR)/../../SourcePackages/checkouts/mlx-swift/Source/Cmlx/include"

  yap:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: yap
        CFBundleShortVersionString: 0.0.1
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: "yap needs microphone access to record your voice for dictation."
        NSAppleEventsUsageDescription: "yap uses keyboard simulation to paste transcribed text into the focused app."
    entitlements:
      path: App/yap.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donadelicc.yap
        PRODUCT_NAME: yap
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Core
      - package: Settings
      - package: Permissions
      - package: ModelStore
      - package: Hotkey
      - package: AudioRecorder
      - target: Transcription
      - target: LLMCleanup
      - package: TextInjector
      - package: MenuBarUI
      - package: SettingsUI
      - package: swift-numerics
        product: Numerics
      - package: swift-numerics
        product: RealModule
      - package: swift-numerics
        product: ComplexModule

  yapTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: AppTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: yap
      - package: Core
      - package: Settings
      - package: Permissions
      - package: ModelStore
      - package: Hotkey
      - package: AudioRecorder
      - target: Transcription
      - target: LLMCleanup
      - package: TextInjector
      - package: MenuBarUI
      - package: SettingsUI
      - package: swift-numerics
        product: Numerics
      - package: swift-numerics
        product: RealModule
      - package: swift-numerics
        product: ComplexModule
