name: yap
options:
  bundleIdPrefix: com.donadelicc
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

packages:
  Core:
    path: Packages/Core
  Settings:
    path: Packages/Settings
  Permissions:
    path: Packages/Permissions
  ModelStore:
    path: Packages/ModelStore
  Hotkey:
    path: Packages/Hotkey
  AudioRecorder:
    path: Packages/AudioRecorder
  TextInjector:
    path: Packages/TextInjector

targets:
  Transcription:
    type: library.static
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Packages/Transcription/Sources/Transcription/Transcriber.swift
    dependencies:
      - package: Core
      - package: ModelStore

  LLMCleanup:
    type: library.static
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Packages/LLMCleanup/Sources/LLMCleanup/TextCleaner.swift
    dependencies:
      - package: Core
      - package: ModelStore

  yap:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: yap
        CFBundleShortVersionString: 0.0.1
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: "yap needs microphone access to record your voice for dictation."
        NSAppleEventsUsageDescription: "yap uses keyboard simulation to paste transcribed text into the focused app."
    entitlements:
      path: App/yap.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.donadelicc.yap
        PRODUCT_NAME: yap
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Core
      - package: Settings
      - package: Permissions
      - package: ModelStore
      - package: Hotkey
      - package: AudioRecorder
      - target: Transcription
      - target: LLMCleanup
      - package: TextInjector

  yapTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: AppTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: yap
      - package: Core
      - package: Settings
      - package: Permissions
      - package: ModelStore
      - package: Hotkey
      - package: AudioRecorder
      - target: Transcription
      - target: LLMCleanup
      - package: TextInjector
